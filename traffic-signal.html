<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="traffic-signal.css">

</head>

<body>
    <div class="container">
        <h1 class="heading">Traffic Light</h1>
        <div class="signals-card">
            <div class=buttons>
                <button class="button" id="stopButton">Stop</button>
                <button class="button" id="readyButton">Ready</button>
                <button class="button" id=goButton>Go</button>
            </div>
            <div class=signal-box>
                <div class=circle id="stopLight"></div>
                <div class=circle id=readyLight></div>
                <div class=circle id="goLight"></div>
            </div>
        </div>
    </div>
    <script src="traffic-signal.js"></script>
</body>

</html>
